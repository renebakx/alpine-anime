name: Publish Package

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@renebakx'

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="${{ github.event.release.tag_name }}"

          if ! printf '%s' "$RELEASE_TAG" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-beta-[0-9]+)?$'; then
            echo "Release tag must look like x.x.x or x.x.x-beta-x"
            exit 1
          fi

          if [ "$PACKAGE_VERSION" != "$RELEASE_TAG" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match release tag ($RELEASE_TAG)"
            exit 1
          fi

          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "NPM_DIST_TAG=beta" >> "$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Preview package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --tag "$NPM_DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
