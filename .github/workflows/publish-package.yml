name: Publish Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish
        required: true
        default: latest

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@renebakx'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Preview package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --tag "$NPM_DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_DIST_TAG: ${{ inputs.tag }}
